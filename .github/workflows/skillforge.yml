name: SkillForge Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skillforge:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest tests.test_skillforge

      - name: Rebuild generated catalogs and static pages
        run: python -m skillforge build-catalog --json

      - name: Verify generated files are committed
        run: git diff --exit-code -- catalog plugins/agent-skills/skills site

      - name: Evaluate NV-Segment-CTMR publication readiness
        run: python -m skillforge evaluate nv-segment-ctmr --json
